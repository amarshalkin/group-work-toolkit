<!--

  Лекции: Сиденко (ИИ-этика), Чернова (безопасность), Антонова (методика)
  Чт 30.04, 11:00–12:20.
  Mobile-first. Акцент: бирюза #35A2A8.
  Механика: 6 шагов, на каждом — варианты + 3 параллельных комментария.
-->
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>06 · Урок-конструктор · Весенний педсовет 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Onest:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --teal:    #35A2A8;
    --teal-d:  #267A7E;
    --teal-soft: rgba(53,162,168,0.10);
    --blue:    #3E529B;
    --ochre:   #A2855F;
    --rose:    #B85C7A;
    --ink:     #2C2B2B;
    --ink-2:   #4A4845;
    --ink-3:   #7A7670;
    --line:    #E2DFD7;
    --line-2:  #C9C4B8;
    --paper:   #F8F8F7;
    --paper-2: #EDEAE2;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { -webkit-text-size-adjust: 100%; -webkit-tap-highlight-color: transparent; }
  body { font-family: 'Onest', system-ui, sans-serif; background: var(--paper); color: var(--ink); font-size: 16px; line-height: 1.5; }
  ::selection { background: var(--teal); color: var(--paper); }

  /* TOP */
  .topbar {
    position: sticky; top: 0; z-index: 50;
    background: rgba(248,248,247,0.96); backdrop-filter: blur(8px);
    border-bottom: 1px solid var(--line);
    padding: 12px 20px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .topbar-mark {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase;
    color: var(--teal); font-weight: 700;
  }
  .topbar-step {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; color: var(--ink-3);
  }
  .topbar-step b { color: var(--ink); }

  /* HERO */
  .hero { padding: 28px 20px 12px; max-width: 720px; margin: 0 auto; }
  .hero-eye {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; color: var(--teal); font-weight: 700;
    letter-spacing: 0.18em; text-transform: uppercase;
    margin-bottom: 16px;
  }
  .hero h1 {
    font-size: clamp(36px,9.5vw,56px);
    line-height: 0.98; letter-spacing: -0.022em; font-weight: 800;
  }
  .hero h1 b { color: var(--teal); font-weight: 800; }
  .hero-sub { margin-top: 18px; color: var(--ink-2); font-size: 16px; max-width: 40ch; }
  .voices-row {
    display: flex; gap: 8px; flex-wrap: wrap;
    margin-top: 22px;
  }
  .voice-chip {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 8px 12px; border-radius: 999px;
    background: var(--paper-2);
    font-size: 12px; font-weight: 600; color: var(--ink);
  }
  .voice-chip .dot { width: 10px; height: 10px; border-radius: 50%; }
  .voice-chip[data-v="s"] .dot { background: var(--teal); }
  .voice-chip[data-v="c"] .dot { background: var(--rose); }
  .voice-chip[data-v="a"] .dot { background: var(--ochre); }

  /* PROGRESS */
  .progress-wrap {
    position: sticky; top: 47px; z-index: 40;
    background: rgba(248,248,247,0.95); backdrop-filter: blur(8px);
    border-bottom: 1px solid var(--line);
    padding: 14px 20px;
  }
  .progress-line {
    display: flex; gap: 4px; max-width: 720px; margin: 0 auto;
  }
  .progress-line .seg {
    flex: 1; height: 4px; background: var(--line); border-radius: 2px;
    transition: background 0.2s;
  }
  .progress-line .seg.done { background: var(--teal); }
  .progress-line .seg.active { background: var(--ink); }
  .progress-meta {
    max-width: 720px; margin: 8px auto 0;
    display: flex; justify-content: space-between;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; color: var(--ink-3);
    letter-spacing: 0.06em;
  }
  .progress-meta b { color: var(--ink); }

  /* STEP */
  .step {
    max-width: 720px; margin: 0 auto;
    padding: 28px 20px 16px;
  }
  .step-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px; letter-spacing: 0.16em; text-transform: uppercase;
    color: var(--ink-3); font-weight: 600; margin-bottom: 8px;
  }
  .step-num b { color: var(--teal); }
  .step h2 {
    font-size: clamp(28px,7vw,40px);
    line-height: 1.05; letter-spacing: -0.02em; font-weight: 800;
  }
  .step-sub { margin-top: 10px; color: var(--ink-2); font-size: 15px; }

  /* OPTIONS */
  .options { padding: 8px 20px 0; max-width: 720px; margin: 0 auto; }
  .opt {
    width: 100%; text-align: left; cursor: pointer;
    background: var(--paper); border: 1.5px solid var(--line);
    border-radius: 16px; padding: 18px;
    margin-bottom: 12px; font: inherit;
    transition: all 0.2s;
  }
  .opt:hover { border-color: var(--ink-3); }
  .opt.selected {
    border-color: var(--teal);
    background: var(--teal-soft);
    box-shadow: 0 0 0 3px rgba(53,162,168,0.12);
  }
  .opt-row {
    display: flex; align-items: flex-start; gap: 14px;
  }
  .opt-radio {
    flex: 0 0 22px; height: 22px;
    border: 2px solid var(--line-2); border-radius: 50%;
    margin-top: 2px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
  }
  .opt.selected .opt-radio {
    border-color: var(--teal); background: var(--teal);
  }
  .opt.selected .opt-radio::after {
    content: ''; width: 8px; height: 8px;
    background: var(--paper); border-radius: 50%;
  }
  .opt-body { flex: 1; }
  .opt-title { font-size: 17px; font-weight: 700; line-height: 1.25; margin-bottom: 4px; }
  .opt-desc { font-size: 14px; color: var(--ink-2); line-height: 1.4; }

  /* VOICES — три комментария */
  .voices {
    max-width: 720px; margin: 18px auto 0;
    padding: 0 20px;
  }
  .voices-eye {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; color: var(--ink-3);
    letter-spacing: 0.16em; text-transform: uppercase;
    font-weight: 600; margin-bottom: 10px;
    display: flex; align-items: center; gap: 8px;
  }
  .voices-eye::before, .voices-eye::after {
    content: ''; flex: 1; height: 1px; background: var(--line);
  }
  .voice-card {
    background: var(--paper); border: 1px solid var(--line);
    border-radius: 14px; padding: 16px 16px 14px;
    margin-bottom: 10px;
    position: relative;
    border-left-width: 4px;
  }
  .voice-card[data-v="s"] { border-left-color: var(--teal); }
  .voice-card[data-v="c"] { border-left-color: var(--rose); }
  .voice-card[data-v="a"] { border-left-color: var(--ochre); }
  .voice-head {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 8px;
  }
  .voice-name {
    font-weight: 700; font-size: 14px;
  }
  .voice-role {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--ink-3); font-weight: 600;
  }
  .voice-text { font-size: 14px; line-height: 1.5; color: var(--ink); }
  .voice-text strong { background: rgba(0,0,0,0.05); padding: 0 4px; border-radius: 3px; }

  .voices-empty {
    background: var(--paper-2); border-radius: 14px;
    padding: 22px 16px; text-align: center;
    font-size: 14px; color: var(--ink-3);
  }

  /* NAV */
  .nav-row {
    max-width: 720px; margin: 24px auto 40px;
    padding: 0 20px;
    display: flex; gap: 10px;
  }
  .nav-btn {
    flex: 1; padding: 16px 20px;
    border-radius: 14px; border: none; cursor: pointer; font: inherit;
    font-weight: 700; font-size: 15px;
    transition: all 0.2s;
  }
  .nav-btn.prev { background: var(--paper-2); color: var(--ink); flex: 0 0 auto; padding: 16px 22px; }
  .nav-btn.prev:hover { background: var(--line); }
  .nav-btn.next {
    background: var(--ink); color: var(--paper);
    display: flex; align-items: center; justify-content: center; gap: 10px;
  }
  .nav-btn.next:hover { background: var(--teal); }
  .nav-btn.next:disabled {
    background: var(--paper-2); color: var(--ink-3); cursor: not-allowed;
  }
  .nav-btn.next:disabled:hover { background: var(--paper-2); }

  /* SUMMARY (step 7) */
  .summary {
    max-width: 720px; margin: 0 auto;
    padding: 8px 20px 0;
  }
  .summary-hero {
    background: var(--ink); color: var(--paper);
    padding: 28px 22px;
    border-radius: 18px;
    position: relative; overflow: hidden;
    margin-bottom: 18px;
  }
  .summary-hero::after {
    content: ''; position: absolute; right: -80px; bottom: -80px;
    width: 220px; height: 220px; border-radius: 50%;
    background: var(--teal); opacity: 0.18;
  }
  .summary-hero .se {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase;
    color: var(--teal); font-weight: 700; margin-bottom: 12px;
  }
  .summary-hero h3 {
    font-size: clamp(28px,7vw,40px);
    line-height: 1.05; font-weight: 800; letter-spacing: -0.018em;
  }
  .summary-hero p {
    margin-top: 14px; font-size: 16px; opacity: 0.85; max-width: 36ch;
    position: relative; z-index: 2;
  }

  .plan-card {
    background: var(--paper); border: 1px solid var(--line);
    border-radius: 16px;
    margin-bottom: 12px; overflow: hidden;
  }
  .plan-row {
    display: grid; grid-template-columns: 90px 1fr;
    gap: 14px; padding: 16px 18px;
    align-items: flex-start;
  }
  .plan-row + .plan-row { border-top: 1px dashed var(--line); }
  .plan-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--ink-3); font-weight: 600;
    padding-top: 3px;
  }
  .plan-value {
    font-size: 15px; font-weight: 600; line-height: 1.35;
  }

  .summary-voices {
    background: var(--paper-2);
    border-radius: 16px;
    padding: 18px 18px 8px;
    margin-bottom: 18px;
  }
  .summary-voices-eye {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; color: var(--ink-3);
    letter-spacing: 0.16em; text-transform: uppercase;
    font-weight: 700; margin-bottom: 14px;
  }
  .sv-item {
    display: grid; grid-template-columns: 14px 1fr;
    gap: 14px; padding: 14px 0;
    border-top: 1px solid var(--line);
  }
  .sv-item:first-child { border-top: none; padding-top: 0; }
  .sv-bar {
    width: 4px; height: 100%; min-height: 40px;
    border-radius: 2px;
  }
  .sv-item[data-v="s"] .sv-bar { background: var(--teal); }
  .sv-item[data-v="c"] .sv-bar { background: var(--rose); }
  .sv-item[data-v="a"] .sv-bar { background: var(--ochre); }
  .sv-name {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--ink-3); font-weight: 600;
    margin-bottom: 4px;
  }
  .sv-text { font-size: 14px; line-height: 1.45; }

  .summary-actions {
    display: flex; gap: 10px;
    margin: 22px 0 40px;
  }
  .summary-actions button {
    flex: 1; padding: 16px 18px;
    border-radius: 14px; border: none; cursor: pointer; font: inherit;
    font-weight: 700; font-size: 15px;
  }
  .btn-print { background: var(--teal); color: var(--paper); }
  .btn-print:hover { background: var(--teal-d); }
  .btn-restart { background: var(--paper-2); color: var(--ink); }
  .btn-restart:hover { background: var(--line); }

  .footer-brand {
    border-top: 1px solid var(--line);
    padding: 28px 20px 36px;
    text-align: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; color: var(--ink-3);
    letter-spacing: 0.14em; text-transform: uppercase;
  }
  .footer-brand b { color: var(--ink-2); font-weight: 600; }

  @media (min-width: 980px) {
    body { font-size: 18px; }
    .hero, .step, .options, .voices, .nav-row, .summary, .footer-brand, .progress-wrap, .topbar { max-width: 1100px; }
    .topbar, .progress-wrap, .footer-brand { padding-left: 40px; padding-right: 40px; }
    .hero { padding: 56px 40px 16px; }
    .hero h1 { font-size: clamp(56px,7vw,84px); }
    .step { padding: 40px 40px 16px; }
    .step h2 { font-size: 56px; }
    .options { padding-left: 40px; padding-right: 40px; }
    .voices, .nav-row, .summary { padding-left: 40px; padding-right: 40px; }
    .voice-card { padding: 22px; }
    .nav-row { margin-bottom: 60px; }
  }

  /* PRINT */
  @media print {
    .topbar, .progress-wrap, .summary-actions, .footer-brand { display: none; }
    body { background: white; }
    .summary-hero, .plan-card, .summary-voices { box-shadow: none; }
    .summary-hero { background: white; color: var(--ink); border: 1px solid var(--ink); }
    .summary-hero::after { display: none; }
    .summary-hero .se, .summary-hero h3 { color: var(--ink); }
    .summary-hero p { color: var(--ink-2); }
  }
</style>
</head>

const state = {
  step: 0,
  choices: {} // stepIdx → optionId
};

function renderProgress() {
  const line = document.getElementById('progressLine');
  line.innerHTML = '';
  for (let i = 0; i < DATA.steps.length; i++) {
    const seg = document.createElement('div');
    seg.className = 'seg';
    if (i < state.step) seg.classList.add('done');
    if (i === state.step) seg.classList.add('active');
    line.appendChild(seg);
  }
  document.getElementById('topStep').textContent = state.step < DATA.steps.length ? state.step + 1 : DATA.steps.length;
  document.getElementById('progressTitle').textContent = state.step < DATA.steps.length ? DATA.steps[state.step].title : 'Готовый план урока';
  document.getElementById('progressMin').textContent = state.step < DATA.steps.length ? '15' : '5';
}

function renderStep() {
  renderProgress();
  const main = document.getElementById('main');
  if (state.step >= DATA.steps.length) { renderSummary(); return; }
  const s = DATA.steps[state.step];
  const sel = state.choices[state.step];

  main.innerHTML = `
    <section class="step">
      <div class="step-num">шаг <b>${state.step+1}</b> из 6</div>
      <h2>${s.title}</h2>
      <p class="step-sub">${s.sub}</p>
    </section>
    <section class="options" id="opts"></section>
    <section class="voices" id="voices"></section>
    <div class="nav-row">
      ${state.step > 0 ? '<button class="nav-btn prev" id="prevBtn">←</button>' : ''}
      <button class="nav-btn next" id="nextBtn" ${sel ? '' : 'disabled'}>
        ${state.step === DATA.steps.length - 1 ? 'Собрать план →' : 'Дальше →'}
      </button>
    </div>`;

  const opts = document.getElementById('opts');
  s.options.forEach(o => {
    const btn = document.createElement('button');
    btn.className = 'opt' + (sel === o.id ? ' selected' : '');
    btn.innerHTML = `
      <div class="opt-row">
        <div class="opt-radio"></div>
        <div class="opt-body">
          <div class="opt-title">${o.title}</div>
          <div class="opt-desc">${o.desc}</div>
        </div>
      </div>`;
    btn.addEventListener('click', () => {
      state.choices[state.step] = o.id;
      renderStep();
    });
    opts.appendChild(btn);
  });

  const voices = document.getElementById('voices');
  if (sel) {
    const opt = s.options.find(o => o.id === sel);
    voices.innerHTML = `<div class="voices-eye">три голоса об этом выборе</div>`;
    ['s','c','a'].forEach(v => {
      const meta = VOICES_META[v];
      voices.innerHTML += `
        <div class="voice-card" data-v="${v}">
          <div class="voice-head">
            <div class="voice-name">${meta.name}</div>
            <div class="voice-role">${meta.role}</div>
          </div>
          <div class="voice-text">${opt.voices[v]}</div>
        </div>`;
    });
  } else {
    voices.innerHTML = `<div class="voices-empty">Выберите вариант — три голоса прокомментируют ваш выбор.</div>`;
  }

  if (state.step > 0) {
    document.getElementById('prevBtn').addEventListener('click', () => {
      state.step--; renderStep(); window.scrollTo({top:0,behavior:'smooth'});
    });
  }
  document.getElementById('nextBtn').addEventListener('click', () => {
    if (!state.choices[state.step]) return;
    state.step++; renderStep(); window.scrollTo({top:0,behavior:'smooth'});
  });
}

function renderSummary() {
  const main = document.getElementById('main');
  const labels = ['Класс и предмет','Цель','Роль ИИ','Безопасность','Главный ход','Проверка'];
  const rows = DATA.steps.map((s, i) => {
    const opt = s.options.find(o => o.id === state.choices[i]);
    return `<div class="plan-row">
      <div class="plan-label">${labels[i]}</div>
      <div class="plan-value">${opt.title}</div>
    </div>`;
  }).join('');

  main.innerHTML = `
    <section class="summary">
      <div class="summary-hero">
        <div class="se">Готовый план · 45 минут</div>
        <h3>Ваш урок собран.</h3>
        <p>Шесть решений превратились в план. Внизу — финальный совет от каждого из трёх голосов.</p>
      </div>

      <div class="plan-card">${rows}</div>

      <div class="summary-voices">
        <div class="summary-voices-eye">финальные комментарии</div>
        ${['s','c','a'].map(v => `
          <div class="sv-item" data-v="${v}">
            <div class="sv-bar"></div>
            <div>
              <div class="sv-name">${VOICES_META[v].name} · ${VOICES_META[v].role}</div>
              <div class="sv-text">${DATA.finalVoices[v]}</div>
            </div>
          </div>`).join('')}
      </div>

      <div class="summary-actions">
        <button class="btn-restart" id="restartBtn">Собрать заново</button>
        <button class="btn-print" id="printBtn">Сохранить PDF</button>
      </div>
    </section>`;

  document.getElementById('restartBtn').addEventListener('click', () => {
    state.step = 0; state.choices = {};
    renderStep(); window.scrollTo({top:0,behavior:'smooth'});
  });
  document.getElementById('printBtn').addEventListener('click', () => window.print());
}

renderStep();
</script>
